name: sglang-vllm-latest
channels:
  - nvidia
  - pytorch
  - conda-forge
dependencies:
  - python=3.10
  - pytorch=2.3.*
  - torchvision=0.18.*
  - pytorch-cuda=12.1        # for GPUs with CUDA ≥ 12.1
  - pip
  - pip:
      - "vllm>=0.8.6"
      - "sglang>=0.4.5"
      - "transformers>=4.45.0"
      - "tokenizers>=0.19.0"
      - "accelerate>=0.33.0"
      - "huggingface-hub>=0.23.0"
      - "pillow>=10.2"

