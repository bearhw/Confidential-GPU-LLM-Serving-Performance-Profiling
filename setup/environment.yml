name: sglang-vllm-latest

channels:
  - pytorch
  - nvidia
  - conda-forge

dependencies:
  - python=3.10
  - pytorch=2.3
  - torchvision=0.18
  - pytorch-cuda=12.1
  - libstdcxx-ng
  - git
  - pip

  - pip:
      - sglang==0.5.4.post2
      - transformers>=4.45
      - tokenizers>=0.19
      - accelerate>=0.33
      - huggingface-hub>=0.23
      - pillow>=10.2
